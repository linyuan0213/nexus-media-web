<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(220, 90%, 96%)"/>
      <stop offset="100%" stop-color="hsl(220, 60%, 92%)"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="hsl(220, 70%, 98%)"/>
      <stop offset="100%" stop-color="hsl(220, 50%, 95%)"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(217, 91%, 60%)"/>
      <stop offset="100%" stop-color="hsl(221, 83%, 53%)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(262, 80%, 70%)"/>
      <stop offset="100%" stop-color="hsl(250, 75%, 55%)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="hsl(220, 60%, 30%)" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- 主播放器卡片 -->
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="280" height="180" rx="16" fill="url(#card)"/>
    <!-- 屏幕区域 -->
    <rect x="80" y="80" width="240" height="120" rx="8" fill="hsl(220, 40%, 20%)"/>
    <!-- 播放按钮 -->
    <circle cx="200" cy="140" r="28" fill="url(#primary)" opacity="0.95"/>
    <polygon points="192,128 192,152 216,140" fill="white"/>
    <!-- 进度条 -->
    <rect x="90" y="212" width="220" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    <rect x="90" y="212" width="140" height="4" rx="2" fill="url(#primary)"/>
    <circle cx="230" cy="214" r="5" fill="url(#primary)"/>
  </g>

  <!-- 左下角海报 1 -->
  <g filter="url(#shadow)">
    <rect x="50" y="260" width="70" height="100" rx="8" fill="url(#card)"/>
    <rect x="58" y="268" width="54" height="72" rx="4" fill="hsl(25, 80%, 60%)"/>
    <rect x="58" y="348" width="30" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    <rect x="58" y="356" width="20" height="4" rx="2" fill="hsl(220, 20%, 92%)"/>
  </g>

  <!-- 底部中间海报 2 -->
  <g filter="url(#shadow)">
    <rect x="140" y="280" width="70" height="100" rx="8" fill="url(#card)"/>
    <rect x="148" y="288" width="54" height="72" rx="4" fill="url(#accent)"/>
    <rect x="148" y="368" width="30" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    <rect x="148" y="376" width="20" height="4" rx="2" fill="hsl(220, 20%, 92%)"/>
  </g>

  <!-- 右下角海报 3 -->
  <g filter="url(#shadow)">
    <rect x="230" y="260" width="70" height="100" rx="8" fill="url(#card)"/>
    <rect x="238" y="268" width="54" height="72" rx="4" fill="hsl(160, 60%, 50%)"/>
    <rect x="238" y="348" width="30" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    㰀rect x="238" y="356" width="20" height="4" rx="2" fill="hsl(220, 20%, 92%)"/>
  </g>

  <!-- 右上角 NAS 服务器图标 -->
  <g filter="url(#shadow)">
    <rect x="310" y="240" width="60" height="80" rx="10" fill="url(#card)"/>
    <rect x="322" y="252" width="36" height="24" rx="4" fill="hsl(220, 30%, 90%)"/>
    <rect x="326" y="256" width="6" height="6" rx="1" fill="hsl(0, 70%, 60%)"/>
    <rect x="336" y="256" width="6" height="6" rx="1" fill="hsl(40, 80%, 55%)"/>
    <rect x="346" y="256" width="6" height="6" rx="1" fill="hsl(140, 60%, 50%)"/>
    <rect x="322" y="284" width="36" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    <rect x="322" y="292" width="28" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
    <rect x="322" y="300" width="20" height="4" rx="2" fill="hsl(220, 20%, 88%)"/>
  </g>

  <!-- 顶部装饰圆点 -->
  <circle cx="340" cy="80" r="24" fill="url(#primary)" opacity="0.1"/>
  <circle cx="360" cy="120" r="16" fill="url(#accent)" opacity="0.08"/>
  <circle cx="80" cy="340" r="20" fill="url(#primary)" opacity="0.06"/>
</svg>
