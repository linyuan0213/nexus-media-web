name: Nexus Media Web Docker

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Release version
        id: release_version
        run: |
          echo "app_version=$(echo $GITHUB_REF_NAME | sed 's/v\(.*\)/\1/')" >> $GITHUB_ENV

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scripts/deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nexus-media-web:latest
            ${{ secrets.DOCKER_USERNAME }}/nexus-media-web:${{ env.app_version }}
            ghcr.io/${{ github.repository_owner }}/nexus-media-web:latest
            ghcr.io/${{ github.repository_owner }}/nexus-media-web:${{ env.app_version }}

  release:
    runs-on: ubuntu-latest
    needs: build
    name: Create Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version and changelog
        id: extract
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

          # 尝试从 CHANGELOG.md 提取版本内容
          CONTENT=$(awk '/^## v'"$VERSION"' /{flag=1;next}/^## v/{flag=0}flag' CHANGELOG.md 2>/dev/null || true)
          if [ -z "$CONTENT" ]; then
            CONTENT="Nexus Media Web $GITHUB_REF_NAME 已发布。"
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CONTENT"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Nexus Media Web ${{ steps.extract.outputs.tag }}
          body: ${{ steps.extract.outputs.notes }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 **Nexus Media Web ${{ steps.extract.outputs.tag }} 已发布**

            ${{ steps.extract.outputs.notes }}

            📦 Docker: `docker pull linyuan0213/nexus-media-web:${{ steps.extract.outputs.version }}`
            🔗 [查看 Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract.outputs.tag }})
