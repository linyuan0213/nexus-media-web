name: Nexus Media Web Docker

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_PWD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Release version
        id: release_version
        run: |
          echo "app_version=$(echo $GITHUB_REF_NAME | sed 's/v\(.*\)/\1/')" >> $GITHUB_ENV

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        if: ${{ env.DOCKERHUB_USER != '' && env.DOCKERHUB_PWD != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_PWD }}

      - name: Login GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Tags
        id: tags
        run: |
          TAGS="ghcr.io/${{ github.repository_owner }}/nexus-media-web:latest
          ghcr.io/${{ github.repository_owner }}/nexus-media-web:${{ env.app_version }}"
          if [ -n "${{ env.DOCKERHUB_USER }}" ] && [ -n "${{ env.DOCKERHUB_PWD }}" ]; then
            TAGS="$TAGS
          ${{ env.DOCKERHUB_USER }}/nexus-media-web:latest
          ${{ env.DOCKERHUB_USER }}/nexus-media-web:${{ env.app_version }}"
          fi
          echo "$TAGS"
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./scripts/deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: build
    name: Create Release
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version and changelog
        id: extract
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

          # 尝试从 CHANGELOG.md 提取版本内容
          CONTENT=$(awk '/^## v'"$VERSION"' /{flag=1;next}/^## v/{flag=0}flag' CHANGELOG.md 2>/dev/null || true)
          if [ -z "$CONTENT" ]; then
            CONTENT="Nexus Media Web $GITHUB_REF_NAME 已发布。"
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CONTENT"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Nexus Media Web ${{ steps.extract.outputs.tag }}
          body: ${{ steps.extract.outputs.notes }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            <b>Nexus Media Web ${{ steps.extract.outputs.tag }} 已发布</b>

            <pre>${{ steps.extract.outputs.notes }}</pre>

            📦 Docker: <code>docker pull linyuan0213/nexus-media-web:${{ steps.extract.outputs.version }}</code>
            🔗 <a href="https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract.outputs.tag }}">查看 Release</a>
